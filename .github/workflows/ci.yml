name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck spec build
        run: npx tsc -p tsconfig.spec.json --noEmit

      - name: Run headless Karma tests
        run: npm test -- --watch=false

      - name: Run production build
        run: npm run build

      - name: Run journey rules tests
        run: npm run test:journey-rules

      - name: Run journey timeline integration tests
        run: npm run test:journey-integration
