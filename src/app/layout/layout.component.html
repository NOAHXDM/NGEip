<!-- Nav -->
<mat-toolbar>
  <a mat-button [routerLink]="['/']">
    <span class="brand-logo"></span>
    品牌標誌
  </a>
  <span class="menu-spacer"></span>

  <!-- Desktop nav -->
  <div class="d-none d-md-flex align-items-center">
    @if(isAdmin$ | async) {
    <button mat-button [matMenuTriggerFor]="systemMenu">
      系統
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    }
    <button mat-button [matMenuTriggerFor]="statisticsMenu">
      統計
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
  </div>

  <!-- Avatar -->
  <span
    class="avator"
    [style.margin.px]="'0 10'"
    [style.backgroundImage]="'url(https://placehold.co/36x36)'"
    [matMenuTriggerFor]="profileMenu"
  >
    @if((currentUser$ | async)?.photoUrl) {
    <img
      [src]="(currentUser$ | async)?.photoUrl"
      alt="使用者頭像"
      class="avator"
    />
    }
  </span>

  <!-- Mobile hamburger -->
  <button mat-icon-button class="d-md-none" [matMenuTriggerFor]="mobileMenu">
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>

<!-- Main content -->
<div class="container-fluid pt-2">
  <router-outlet></router-outlet>
</div>

<!-- System menu (Admin only) -->
<mat-menu #systemMenu>
  <button mat-menu-item [routerLink]="['/Users']">
    <mat-icon>people</mat-icon>
    <span>使用者管理</span>
  </button>
  <button mat-menu-item [routerLink]="['/SystemConfig']">
    <mat-icon>settings</mat-icon>
    <span>系統設定</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item [routerLink]="['/evaluation/admin/cycles']">
    <mat-icon>manage_history</mat-icon>
    <span>考評週期管理</span>
  </button>
  <button mat-menu-item [routerLink]="['/evaluation/admin/overview']">
    <mat-icon>dashboard</mat-icon>
    <span>考評總覽</span>
  </button>
</mat-menu>

<!-- Statistics menu -->
<mat-menu #statisticsMenu>
  <button mat-menu-item [routerLink]="['/Subsidy/List']">
    <mat-icon>request_quote</mat-icon>
    <span>補助申請</span>
  </button>
  <button mat-menu-item [routerLink]="['/Subsidy/Meals']">
    <mat-icon>restaurant</mat-icon>
    <span>餐費補助</span>
  </button>
  <button mat-menu-item [routerLink]="['/Subsidy/Stats']">
    <mat-icon>bar_chart</mat-icon>
    <span>補助統計</span>
  </button>
</mat-menu>

<!-- Profile menu -->
<mat-menu #profileMenu>
  <button mat-menu-item [routerLink]="['/MyProfile']">
    <mat-icon>account_circle</mat-icon>
    <span>個人資料</span>
  </button>
  <button mat-menu-item [routerLink]="['/evaluation/tasks']">
    <mat-icon>assignment</mat-icon>
    <span>我的考評任務</span>
  </button>
  <button mat-menu-item [routerLink]="['/evaluation/my-report']">
    <mat-icon>insights</mat-icon>
    <span>我的屬性報告</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>登出</span>
  </button>
</mat-menu>

<!-- Mobile menu -->
<mat-menu #mobileMenu>
  @if(isAdmin$ | async) {
  <button mat-menu-item [routerLink]="['/Users']">
    <mat-icon>people</mat-icon>
    <span>使用者管理</span>
  </button>
  <button mat-menu-item [routerLink]="['/SystemConfig']">
    <mat-icon>settings</mat-icon>
    <span>系統設定</span>
  </button>
  <button mat-menu-item [routerLink]="['/evaluation/admin/cycles']">
    <mat-icon>manage_history</mat-icon>
    <span>考評週期管理</span>
  </button>
  <button mat-menu-item [routerLink]="['/evaluation/admin/overview']">
    <mat-icon>dashboard</mat-icon>
    <span>考評總覽</span>
  </button>
  <mat-divider></mat-divider>
  }
  <button mat-menu-item [routerLink]="['/Subsidy/List']">
    <mat-icon>request_quote</mat-icon>
    <span>補助申請</span>
  </button>
  <button mat-menu-item [routerLink]="['/Subsidy/Meals']">
    <mat-icon>restaurant</mat-icon>
    <span>餐費補助</span>
  </button>
  <button mat-menu-item [routerLink]="['/Subsidy/Stats']">
    <mat-icon>bar_chart</mat-icon>
    <span>補助統計</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item [routerLink]="['/MyProfile']">
    <mat-icon>account_circle</mat-icon>
    <span>個人資料</span>
  </button>
  <button mat-menu-item [routerLink]="['/evaluation/tasks']">
    <mat-icon>assignment</mat-icon>
    <span>我的考評任務</span>
  </button>
  <button mat-menu-item [routerLink]="['/evaluation/my-report']">
    <mat-icon>insights</mat-icon>
    <span>我的屬性報告</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>登出</span>
  </button>
</mat-menu>
