<div class="dialog-title" mat-dialog-title>
  <h2>{{ name }}</h2>
  <button type="button" mat-button mat-dialog-close aria-label="關閉附件預覽">關閉</button>
</div>
<mat-dialog-content>
  @if (loading) { <mat-spinner diameter="36"></mat-spinner> }
  @if (error) {
    <p class="error" role="alert">{{ error }}</p>
    <button type="button" (click)="load()">重試</button>
  }
  @if (safeUrl && isImage) {
    <img [src]="safeUrl" [alt]="name" />
  } @else if (safeUrl) {
    <object [data]="safeUrl" type="application/pdf">
      <a [href]="objectUrl" target="_blank" rel="noopener">另開附件</a>
    </object>
  }
</mat-dialog-content>
