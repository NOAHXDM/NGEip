<div class="container d-flex justify-content-center align-items-center py-2">
  <form
    class="d-flex flex-column gap-3"
    [formGroup]="configForm"
    (ngSubmit)="updateLicense()"
    novalidate
  >
    <h3 class="pt-3 text-center">系統設定</h3>
    <!-- 目前在職人數由 users 集合即時計算，不儲存於 systemConfig/license -->
    <mat-form-field appearance="outline">
      <mat-label>目前在職人數</mat-label>
      <input type="number" matInput formControlName="currentUsers" />
      <mat-icon matSuffix>person</mat-icon>
      <mat-hint>依未設定離職日的使用者即時計算</mat-hint>
    </mat-form-field>
    <!-- 最大使用者數 -->
    <mat-form-field appearance="outline">
      <mat-label>最大使用者數</mat-label>
      <input type="number" matInput formControlName="maxUsers" />
      <mat-icon matSuffix>person</mat-icon>
      <mat-hint>上限</mat-hint>
    </mat-form-field>
    <!-- 初始結算年份 -->
    <mat-form-field appearance="outline">
      <mat-label>初始結算年份</mat-label>
      <input type="number" matInput formControlName="initialSettlementYear" />
      <mat-icon matSuffix>123</mat-icon>
      <mat-hint>請輸入年份</mat-hint>
    </mat-form-field>

    <mat-slide-toggle formControlName="timeFilterRange"
      >時間篩選範圍</mat-slide-toggle
    >

    <section formArrayName="overtimePriorityReplacedByLeave">
      <h6>加班抵銷事假</h6> 
      @for (reasonPriority of reasonPriorityList; track reasonPriority.value) {
      <p>
        <mat-checkbox [formControlName]="$index">{{
          reasonPriority.text
        }}</mat-checkbox>
      </p>
      }
    </section>
    <hr />

    <button type="submit" mat-flat-button [disabled]="configForm.invalid">
      更新
    </button>
  </form>
</div>
