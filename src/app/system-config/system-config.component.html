<div class="container d-flex justify-content-center align-items-center py-2">
  <form
    class="d-flex flex-column gap-3"
    [formGroup]="configForm"
    (ngSubmit)="updateLicense()"
    novalidate
  >
    <h3 class="pt-3 text-center">系統設定</h3>
    <!-- 當前使用者數 -->
    <mat-form-field appearance="outline">
      <mat-label>當前使用者數</mat-label>
      <input type="number" matInput formControlName="currentUsers" />
      <mat-icon matSuffix>person</mat-icon>
      <mat-hint>使用者數量</mat-hint>
    </mat-form-field>
    <!-- 最大使用者數 -->
    <mat-form-field appearance="outline">
      <mat-label>最大使用者數</mat-label>
      <input type="number" matInput formControlName="maxUsers" />
      <mat-icon matSuffix>person</mat-icon>
      <mat-hint>上限</mat-hint>
    </mat-form-field>
    <!-- 初始結算年份 -->
    <mat-form-field appearance="outline">
      <mat-label>初始結算年份</mat-label>
      <input type="number" matInput formControlName="initialSettlementYear" />
      <mat-icon matSuffix>123</mat-icon>
      <mat-hint>請輸入年份</mat-hint>
    </mat-form-field>

    <mat-slide-toggle formControlName="timeFilterRange"
      >時間篩選範圍</mat-slide-toggle
    >

    <section formArrayName="overtimePriorityReplacedByLeave">
      <h6>加班抵銷事假</h6> 
      @for (reasonPriority of reasonPriorityList; track reasonPriority.value) {
      <p>
        <mat-checkbox [formControlName]="$index">{{
          reasonPriority.text
        }}</mat-checkbox>
      </p>
      }
    </section>
    <hr />
    <a
      href="https://cloudinary.com/documentation"
      target="_blank"
      class="cloudinary"
    >
      <img
        src="https://assets.streamlinehq.com/image/private/w_300,h_300,ar_1/f_auto/v1/icons/1/cloudinary-icon-ug0qqy8ms6ozyzy6cntbll.png/cloudinary-icon-hz05evx1htrghud89kpab4.png?_a=DATAdtAAZAA0"
        class="cloudinary"
      />
    </a>
    <mat-form-field appearance="outline">
      <mat-label>雲端名稱</mat-label>
      <input type="text" matInput formControlName="cloudinaryCloudName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>上傳預設</mat-label>
      <input type="text" matInput formControlName="cloudinaryUploadPreset" />
    </mat-form-field>
    <button
      type="button"
      mat-raised-button
      (click)="downloadUsersPhotoPublicId()"
    >
      下載使用者頭像 PublicId
    </button>
    <hr />

    <button type="submit" mat-flat-button [disabled]="configForm.invalid">
      更新
    </button>
  </form>
</div>
